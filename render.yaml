services:
  - type: web
    name: reasoning-skill
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: off
    healthCheckPath: /api/health
    envVars:
      - key: TRS_DEMO_API_KEY
        sync: false
      - key: TRS_DEMO_PROXY_URL
        sync: false
